{% extends "base.html" %}

{% block title %}Editar Produto{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="page-header">
        <div>
            <h2>Editar Produto</h2>
            <p>Alterando informações do produto: <strong>{{ produto[1] }}</strong></p>
        </div>
        <a href="/produtos" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Nome do Produto</label>
                <input type="text" name="nome" class="form-control" value="{{ produto[1] }}" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">Preço (R$)</label>
                    <input type="number" step="0.01" name="preco" class="form-control" value="{{ produto[2] }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Estoque</label>
                    <input type="number" name="estoque" class="form-control" value="{{ produto[3] }}" required>
                </div>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                <a href="/produtos" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
