{% extends "base.html" %}

{% block title %}Cadastrar Produto{% endblock %}

{% block content %}
<div class="page-wrapper">
  
  <div class="page-header">
    <div>
      <h2>➕ Cadastrar Novo Produto</h2>
      <p>Adicione novos itens ao cardápio e gerencie o estoque da cantina.</p>
    </div>
    <div>
      <a href="/produtos" class="btn btn-secondary">
        📋 Voltar para Produtos
      </a>
    </div>
  </div>

  <div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('cadastrar_produto') }}" method="POST">
      
      <div class="form-group">
        <label for="nome" class="form-label">Nome do Produto</label>
        <input 
          type="text" 
          id="nome" 
          name="nome" 
          class="form-control" 
          placeholder="Ex: Arepa Reina Pepiada, Pão de Queijo..." 
          required 
          autocomplete="off"
        />
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.2rem;">
        
        <div class="form-group" style="margin-bottom: 0;">
          <label for="preco" class="form-label">Preço (R$)</label>
          <input 
            type="number" 
            id="preco" 
            name="preco" 
            class="form-control" 
            placeholder="0.00" 
            step="0.01" 
            min="0" 
            required
          />
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label for="estoque" class="form-label">Estoque Inicial</label>
          <input 
            type="number" 
            id="estoque" 
            name="estoque" 
            class="form-control" 
            placeholder="Ex: 20" 
            min="0" 
            required
          />
        </div>

      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-txt">ArepaPop System</div>
        <div class="divider-line"></div>
      </div>

      <div style="display: flex; justify-content: flex-end; gap: 1rem; align-items: center;">
        <a href="/produtos" class="text-muted" style="text-decoration: none; font-size: 0.85rem;">Cancelar</a>
        <button type="submit" class="btn btn-primary">
          💾 Salvar Produto
        </button>
      </div>

    </form>
  </div>

</div>
{% endblock %}
