{% extends "base.html" %}

{% block title %}Login Administrativo{% endblock %}

{% block content %}
<div class="page-wrapper" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 200px);">

  <div class="card" style="width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
    
    <div style="text-align: center; margin-bottom: 2rem;">
      <div class="logo-icon" style="margin: 0 auto 15px; width: 50px; height: 50px; font-size: 24px;">🔑</div>
      <h2 style="font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: -0.5px;">
        Área do <span class="text-gold">Admin</span>
      </h2>
      <p class="text-muted" style="font-size: 0.8rem; margin-top: 5px;">Autenticação para gerenciamento da cantina</p>
    </div>

    {% if erro %}
    <div class="alert-box mb-3" style="padding: 10px 14px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <span>❌</span>
        <p style="font-weight: 600; font-size: 0.85rem;">{{ erro }}</p>
      </div>
    </div>
    {% endif %}

    <form action="{{ url_for('login') }}" method="POST">
      
      <div class="form-group mb-3">
        <label for="usuario" class="form-label">Usuário</label>
        <input 
          type="text" 
          id="usuario" 
          name="usuario" 
          class="form-control" 
          placeholder="Digite o usuário administrador" 
          required 
          autofocus
          autocomplete="username"
        />
      </div>

      <div class="form-group mb-4">
        <label for="senha" class="form-label">Senha</label>
        <input 
          type="password" 
          id="senha" 
          name="senha" 
          class="form-control" 
          placeholder="••••••••••••" 
          required
          autocomplete="current-password"
        />
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-txt">ArepaPop Secure</div>
        <div class="divider-line"></div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px; font-size: 0.9rem;">
        Entrar no Sistema 🚀
      </button>

    </form>
  </div>

</div>
{% endblock %}
